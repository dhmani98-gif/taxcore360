[build]
builder = "nixpacks"

[build.nixpacksConfig]
nodeVersion = "20"

# Caddy configuration for SPA routing
[build.nixpacksConfig.caddyfile]
content = """
:{$PORT} {
    root * /app/dist
    file_server
    
    # SPA fallback - rewrite all non-file paths to index.html
    @notFile {
        not file
    }
    rewrite @notFile /index.html
}
"""

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"

[build]
builder = "nixpacks"

[build.nixpacksConfig]
nodeVersion = "20"

# Caddy configuration for SPA routing
[build.nixpacksConfig.caddyfile]
content = """
:{$PORT} {
    root * /app/dist
    
    # Try to serve files directly
    handle /assets/* {
        file_server
    }
    
    # For all other paths, serve index.html (SPA)
    handle {
        try_files {path} /index.html
        file_server
    }
}
"""

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
